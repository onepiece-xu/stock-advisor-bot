monitor:
  provider: eastmoney_minute
  stocks:
    - exchange: sz
      code: "003035"
    - exchange: sh
      code: "601698"
    - exchange: sh
      code: "603993"
  benchmark:
    enabled: true
    exchange: sh
    code: "000001"
  schedule:
    enabled: true
    run_on_startup: true
    fixed_delay_seconds: 30
    restrict_to_trading_session: true
    market_time_zone: Asia/Shanghai
  signal:
    history_size: 480
    decision_thresholds:
      buy_score: 78
      hold_score: 58
      reduce_score: 38
    thresholds:
      daily_change_pct: 2.0
      average_bias_pct: 1.0
      abnormal_step_pct: 1.5
      abnormal_range_pct: 3.0
  provider_settings:
    request_timeout_ms: 4000
    tencent:
      base_url: https://qt.gtimg.cn/q=
  notification:
    notify_on_neutral: false
    dedup:
      enabled: true
      cooldown_minutes: 30
    feishu:
      enabled: false
      delivery_mode: webhook
      webhook_url: ""
portfolio:
  data_dir: data/portfolio
storage:
  sqlite_path: data/market.db
trading_plan:
  path: trading-plan.json
review:
  enabled: true
  auto_notify: true
  send_after_hour: 15
  send_after_minute: 10
  data_dir: data/reviews
feishu_bot:
  enabled: false
  app_id: ""
  app_secret: ""
  verification_token: ""
  listen_host: 0.0.0.0
  listen_port: 8788
  allowed_chat_ids: []
